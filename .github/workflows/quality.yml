name: Quality mcp-voice

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "package.json"
      - "tsconfig.json"
      - "biome.json"
      - "knip.json"
      - ".github/workflows/quality.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Mechanical quality gate (hard tier = error fails; soft tier = warn surfaces).
      - name: Lint + format (Biome)
        run: bunx biome ci src test

      - name: Dead code / unused exports (knip)
        run: bunx knip

      - name: Strict type-check
        run: bunx tsc --noEmit
